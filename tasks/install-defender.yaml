---
- name: Construct MDE onboarding URL
  ansible.builtin.set_fact:
    mde_onboarding_url: "https://sikkeransatt.blob.core.windows.net/{{ service_id }}/mdatp_onboard.json"

- name: Setup microsoft repositories
  ansible.builtin.include_tasks:
    file: tasks/setup-microsoft-repositories.yaml

- name: Create a directory if it does not exist
  ansible.builtin.file:
    path: /tmp/mde_install
    state: directory
    mode: '0755'

- name: Download Onboarding script
  ansible.builtin.get_url:
    url: "{{ mde_installer_url }}"
    dest: /tmp/mde_install/mde_installer.sh
    mode: '0500'

- name: Download Onboarding json
  ansible.builtin.get_url:
    url: "{{ mde_onboarding_url }}"
    dest: /tmp/mde_install/mdatp_onboard.json
    mode: '0600'

- name: Install MDE
  ansible.builtin.package:
    name: mdatp
    state: present

- name: Install MDE on host
  ansible.builtin.script:
    cmd: >
      /tmp/mde_install/mde_installer.sh
      --onboard /tmp/mde_install/mdatp_onboard.json
      --rtp-mode
      --tag GROUP SikkerAnsattLinux
      --verbose
      --debug
      --log-path {{ mde_installer_log }}

- name: Cleanup MDE installation files
  ansible.builtin.file:
    path: /tmp/mde_install
    state: absent
