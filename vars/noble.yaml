---
microsoft_repositories:
  - name: microsoft-prod
    uris: "https://packages.microsoft.com/ubuntu/{{ ansible_distribution_version }}/prod"
    suites: "{{ ansible_distribution_release }}"
    components:
      - main
    architectures:
      - amd64
    signed_by: "https://packages.microsoft.com/keys/microsoft.asc"
  - name: microsoft-edge
    uris: https://packages.microsoft.com/repos/edge
    suites: stable
    components:
      - main
    architectures:
      - amd64
    signed_by: "https://packages.microsoft.com/keys/microsoft.asc"
