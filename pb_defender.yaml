---
- name: Install and onboard Microsoft Defender for Endpoint
  hosts: localhost
  vars_files:
    - settings.yaml

  pre_tasks:
    - name: Loading environment variables
      ansible.builtin.set_fact:
        tenant_domain: '{{ lookup("ansible.builtin.env", "TENANT_DOMAIN") }}'
        local_admin_groups: '{{ lookup("ansible.builtin.env", "LOCAL_ADMIN_GROUPS") == "true" }}'

  tasks:
    - name: Include customer spesific variables
      ansible.builtin.include_vars:
        file: "{{ customer_settings_file }}"

    - name: Create a directory if it does not exist
      ansible.builtin.file:
        path: /tmp/mde_install
        state: directory
        mode: '0755'

    - name: Download Onboarding script
      ansible.builtin.get_url:
        url: "{{ mde_installer_url }}"
        dest: /tmp/mde_install/mde_installer.sh
        mode: '0500'

    - name: Download Onboarding json
      ansible.builtin.get_url:
        url: "{{ MDE_ONBOARDING_URL }}"
        dest: /tmp/mde_install/mdatp_onboard.json
        mode: '0600'

    - name: Install MDE on host
      ansible.builtin.script:
        cmd: >
          /tmp/mde_install/mde_installer.sh --install --channel prod
          --onboard /tmp/mde_install/mdatp_onboard.json --rtp-mode
          --verbose --log-path {{ mde_installer_log }}
